name: Build desktop installers

on:
  workflow_dispatch:
  push:
    tags:
      - 'v*'

jobs:
  build:
    strategy:
      matrix:
        include:
          - os: macos-14
            command: package:mac
          - os: windows-2025
            command: package:win
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
      - run: npm ci
      - name: Require Developer ID signing credentials
        if: runner.os == 'macOS'
        env:
          CSC_LINK: ${{ secrets.MAC_CSC_LINK }}
          CSC_KEY_PASSWORD: ${{ secrets.MAC_CSC_KEY_PASSWORD }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_APP_SPECIFIC_PASSWORD: ${{ secrets.APPLE_APP_SPECIFIC_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
          MAC_INSTALLER_IDENTITY: ${{ secrets.MAC_INSTALLER_IDENTITY }}
          MAC_INSTALLER_CSC_LINK: ${{ secrets.MAC_INSTALLER_CSC_LINK }}
          MAC_INSTALLER_CSC_KEY_PASSWORD: ${{ secrets.MAC_INSTALLER_CSC_KEY_PASSWORD }}
        run: |
          test -n "$CSC_LINK"
          test -n "$CSC_KEY_PASSWORD"
          test -n "$APPLE_ID"
          test -n "$APPLE_APP_SPECIFIC_PASSWORD"
          test -n "$APPLE_TEAM_ID"
          test -n "$MAC_INSTALLER_IDENTITY"
          test -n "$MAC_INSTALLER_CSC_LINK"
          test -n "$MAC_INSTALLER_CSC_KEY_PASSWORD"
      - name: Import Developer ID Installer certificate
        if: runner.os == 'macOS'
        env:
          BUILD_CERTIFICATE_BASE64: ${{ secrets.MAC_INSTALLER_CSC_LINK }}
          P12_PASSWORD: ${{ secrets.MAC_INSTALLER_CSC_KEY_PASSWORD }}
        run: |
          CERTIFICATE_PATH="$RUNNER_TEMP/framenote-installer.p12"
          KEYCHAIN_PATH="$RUNNER_TEMP/framenote-installer.keychain-db"
          KEYCHAIN_PASSWORD="$(uuidgen)"
          printf '%s' "$BUILD_CERTIFICATE_BASE64" | base64 --decode -o "$CERTIFICATE_PATH"
          security create-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security set-keychain-settings -lut 21600 "$KEYCHAIN_PATH"
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security import "$CERTIFICATE_PATH" -P "$P12_PASSWORD" -A -t cert -f pkcs12 -k "$KEYCHAIN_PATH"
          security set-key-partition-list -S apple-tool:,apple: -k "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          EXISTING_KEYCHAINS="$(security list-keychains -d user | tr -d '\"')"
          security list-keychains -d user -s "$KEYCHAIN_PATH" $EXISTING_KEYCHAINS
          security find-identity -v "$KEYCHAIN_PATH" | grep -F "Developer ID Installer:"
      - run: npm run ${{ matrix.command }}
        env:
          CSC_LINK: ${{ secrets.MAC_CSC_LINK }}
          CSC_KEY_PASSWORD: ${{ secrets.MAC_CSC_KEY_PASSWORD }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_APP_SPECIFIC_PASSWORD: ${{ secrets.APPLE_APP_SPECIFIC_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
          MAC_INSTALLER_IDENTITY: ${{ secrets.MAC_INSTALLER_IDENTITY }}
      - uses: actions/upload-artifact@v4
        with:
          name: framenote-desktop-${{ runner.os }}
          path: release/*
